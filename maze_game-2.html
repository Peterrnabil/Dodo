<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Maze Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a1628;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;}
.wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:22px 18px 18px;background:#0d1b2a;border-radius:20px;border:1px solid #1a3a5c;box-shadow:0 0 40px rgba(55,138,221,0.15);max-width:380px;width:100%;}
.header{display:flex;align-items:center;gap:16px;justify-content:center;}
.av-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;}
.av{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2.5px solid #378add;}
.av.goal{border-color:#d4537e;}
.av-label{font-size:9px;letter-spacing:2px;color:#4a7aaa;text-transform:uppercase;font-weight:600;}
.arr{display:flex;align-items:center;gap:6px;color:#378add;font-size:20px;}
.hrt{color:#d4537e;font-size:16px;}
.stats{display:flex;gap:20px;font-size:11px;letter-spacing:1.5px;color:#4a7aaa;text-transform:uppercase;font-weight:600;}
.sv{color:#b5d4f4;font-size:15px;font-weight:700;margin-left:5px;}
.maze-outer{position:relative;border:1.5px solid #185fa5;border-radius:10px;overflow:hidden;box-shadow:0 0 20px rgba(55,138,221,0.2);}
canvas{display:block;}
.overlay{position:absolute;inset:0;background:rgba(10,22,40,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;border-radius:8px;z-index:10;}
.ov-title{font-size:20px;font-weight:800;color:#378add;letter-spacing:3px;text-transform:uppercase;text-align:center;}
.ov-sub{color:#7aaed4;font-size:13px;text-align:center;line-height:1.8;}
.ov-btn{background:#185fa5;color:#e6f1fb;border:none;border-radius:10px;padding:11px 32px;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:background 0.15s,transform 0.08s;}
.ov-btn:hover{background:#378add;transform:scale(1.04);}
.ctrls{display:grid;grid-template-areas:". up ." "left mid right" ". dn .";gap:8px;}
.btn{width:52px;height:52px;border-radius:50%;border:none;background:#185fa5;color:#b5d4f4;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.12s,transform 0.08s;box-shadow:0 3px 10px rgba(24,95,165,0.5);user-select:none;-webkit-user-select:none;}
.btn:hover{background:#378add;color:#fff;}
.btn:active{transform:scale(0.9);background:#0c447c;}
.up{grid-area:up;}.left{grid-area:left;}.mid{grid-area:mid;background:#6b2040;color:#ed93b1;font-size:16px;cursor:default;}.right{grid-area:right;}.dn{grid-area:dn;}
.win-avs{display:flex;align-items:center;gap:10px;}
.win-av{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid #d4537e;}
@keyframes pulse{from{transform:scale(1);}to{transform:scale(1.35);}}
@keyframes fadeIn{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}
</style>
</head>

const playerImg=new Image(); playerImg.src=MAN_SRC;
const goalImg=new Image(); goalImg.src=GIRL_SRC;

let maze=[], player={x:0,y:0}, goal={x:COLS-1,y:ROWS-1};
let moves=0, level=1, bests=[], gameActive=false, raf=null;

function generateMaze(cols,rows){
  let g=Array.from({length:rows},()=>Array.from({length:cols},()=>
    ({visited:false,walls:{top:true,right:true,bottom:true,left:true}})));
  function carve(x,y){
    g[y][x].visited=true;
    let d=[{dx:0,dy:-1,w:'top',ow:'bottom'},{dx:1,dy:0,w:'right',ow:'left'},
           {dx:0,dy:1,w:'bottom',ow:'top'},{dx:-1,dy:0,w:'left',ow:'right'}];
    d.sort(()=>Math.random()-0.5);
    for(let{dx,dy,w,ow}of d){
      let nx=x+dx,ny=y+dy;
      if(nx>=0&&nx<cols&&ny>=0&&ny<rows&&!g[ny][nx].visited){
        g[y][x].walls[w]=false; g[ny][nx].walls[ow]=false; carve(nx,ny);
      }
    }
  }
  carve(0,0); return g;
}

function clipCircle(img,cx,cy,r){
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
  ctx.drawImage(img,cx-r,cy-r,r*2,r*2); ctx.restore();
}

function draw(){
  ctx.fillStyle='#0d1b2a'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    ctx.fillStyle=(x+y)%2===0?'#0f2035':'#0d1b2a';
    ctx.fillRect(x*CELL,y*CELL,CELL,CELL);
  }
  ctx.strokeStyle='#1e5c9e'; ctx.lineWidth=1.8;
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const cx=x*CELL,cy=y*CELL,w=maze[y][x].walls;
    if(w.top){ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+CELL,cy);ctx.stroke();}
    if(w.right){ctx.beginPath();ctx.moveTo(cx+CELL,cy);ctx.lineTo(cx+CELL,cy+CELL);ctx.stroke();}
    if(w.bottom){ctx.beginPath();ctx.moveTo(cx,cy+CELL);ctx.lineTo(cx+CELL,cy+CELL);ctx.stroke();}
    if(w.left){ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,cy+CELL);ctx.stroke();}
  }
  const t=Date.now()/500, pulse=0.5+0.5*Math.sin(t);
  const gx=goal.x*CELL+CELL/2, gy=goal.y*CELL+CELL/2;
  ctx.fillStyle=`rgba(212,83,126,${0.15+pulse*0.2})`; ctx.beginPath(); ctx.arc(gx,gy,CELL*0.5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=`rgba(212,83,126,${0.5+pulse*0.4})`; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(gx,gy,CELL*0.46,0,Math.PI*2); ctx.stroke();
  if(goalImg.complete) clipCircle(goalImg,gx,gy,CELL*0.38);
  const px=player.x*CELL+CELL/2, py=player.y*CELL+CELL/2;
  ctx.fillStyle='rgba(55,138,221,0.2)'; ctx.beginPath(); ctx.arc(px,py,CELL*0.5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(55,138,221,0.8)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(px,py,CELL*0.46,0,Math.PI*2); ctx.stroke();
  if(playerImg.complete) clipCircle(playerImg,px,py,CELL*0.38);
}

function loop(){ draw(); if(gameActive) raf=requestAnimationFrame(loop); }

function move(dx,dy){
  if(!gameActive) return;
  const nx=player.x+dx, ny=player.y+dy;
  if(nx<0||nx>=COLS||ny<0||ny>=ROWS) return;
  const w=maze[player.y][player.x].walls;
  if(dx===1&&w.right||dx===-1&&w.left||dy===1&&w.bottom||dy===-1&&w.top) return;
  player={x:nx,y:ny}; moves++;
  document.getElementById('movesD').textContent=moves;
  if(player.x===goal.x&&player.y===goal.y){
    gameActive=false;
    if(!bests[level-1]||moves<bests[level-1]) bests[level-1]=moves;
    document.getElementById('bestD').textContent=bests[level-1];
    draw(); setTimeout(showWin,200);
  }
}

function showWin(){
  const ov=document.getElementById('overlay');
  document.getElementById('ovTitle').innerHTML='<span style="color:#d4537e">❤</span> You Made It! <span style="color:#d4537e">❤</span>';
  const oav=document.getElementById('ovAvatars');
  oav.className='win-avs';
  oav.innerHTML=`<img class="win-av" src="${MAN_SRC}"><span style="color:#d4537e;font-size:24px;display:inline-block;animation:pulse 0.7s infinite alternate;">❤</span><img class="win-av" src="${GIRL_SRC}">`;
  let cd=5;
  const sub=document.getElementById('ovSub');
  function tick(){
    sub.innerHTML=`Solved in <b style="color:#b5d4f4">${moves}</b> moves<br><span style="color:#7aaed4;font-size:12px;">Redirecting to the surprise in <b style="color:#ed93b1">${cd}</b>...</span>`;
    if(cd<=0){ window.open('https://peternabill.my.canva.site/dodomartyengagement','_top'); return; }
    cd--; setTimeout(tick,1000);
  }
  tick();
  const btn=document.getElementById('ovBtn');
  btn.textContent='Open Surprise 💕';
  btn.style.background='#7c2e4a';
  btn.onclick=()=>window.open('https://peternabill.my.canva.site/dodomartyengagement','_top');
  ov.style.display='flex';
  ov.style.animation='fadeIn 0.4s ease';
}

function startGame(){
  if(raf) cancelAnimationFrame(raf);
  maze=generateMaze(COLS,ROWS);
  player={x:0,y:0}; goal={x:COLS-1,y:ROWS-1};
  moves=0;
  document.getElementById('movesD').textContent='0';
  document.getElementById('bestD').textContent=bests[level-1]||'—';
  document.getElementById('levelD').textContent=level;
  document.getElementById('ovTitle').textContent='Maze Run';
  document.getElementById('ovAvatars').innerHTML='';
  document.getElementById('ovSub').innerHTML='Find your way through the maze<br>to reach her! 💕';
  const btn=document.getElementById('ovBtn');
  btn.textContent='▶ Start'; btn.style.background=''; btn.onclick=startGame;
  document.getElementById('overlay').style.display='none';
  gameActive=true; loop();
}

document.addEventListener('keydown',e=>{
  const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
              w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};
  const d=map[e.key]; if(d){ e.preventDefault(); move(...d); }
});
</script>
